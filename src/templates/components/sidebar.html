<aside id="sidebar"
  class="flex flex-col w-64 min-w-0 bg-[#0d0d0d] border-r border-[#1a1a1a] transition-all duration-200 relative shrink-0">

  <!-- Collapse toggle -->
  <button id="sidebar-toggle"
    class="absolute -right-3 top-5 z-10 w-6 h-6 flex items-center justify-center rounded-full bg-[#1a1a1a] border border-[#252525] hover:bg-[#222] text-gray-500 text-xs transition-colors">
    ‹
  </button>

  <div id="sidebar-content" class="flex flex-col flex-1 p-4 overflow-y-auto gap-6 min-w-0">

    <!-- Logo / title -->
    <div class="sidebar-label pt-1">
      <h1 class="text-base font-semibold text-white truncate tracking-tight">Punto Medio</h1>
      <p class="text-xs text-gray-600 mt-0.5">Fact Checker</p>
    </div>

    <!-- Active Role -->
    <div class="sidebar-label">
      <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-1.5">Active Role</p>
      <p id="sidebar-role-name" class="text-sm font-medium text-gray-300 truncate">—</p>
      <a href="/" id="change-role-btn"
        class="mt-2 inline-block text-xs text-gray-600 hover:text-gray-300 transition-colors">
        Change role
      </a>
    </div>

    <!-- GFCA API Key -->
    <div class="sidebar-label">
      <p class="text-[10px] text-gray-600 uppercase tracking-widest mb-2">GFCA API Key</p>

      <!-- No key set: input form -->
      <div id="api-key-form" class="flex flex-col gap-2">
        <input id="api-key-input" type="password" placeholder="Enter API key…"
          class="w-full bg-[#111] border border-[#252525] rounded-lg px-2 py-1.5 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-[#3a3a3a]" />
        <label class="flex items-center gap-2 text-xs text-gray-600 cursor-pointer select-none">
          <input id="api-key-remember" type="checkbox" class="accent-gray-400" />
          Remember this key
        </label>
        <button id="api-key-save-btn"
          class="px-3 py-1.5 rounded-lg bg-[#1a1a1a] border border-[#252525] hover:bg-[#222] text-xs text-gray-400 font-medium transition-colors">
          Save
        </button>
      </div>

      <!-- Key set: masked display -->
      <div id="api-key-display" class="hidden flex flex-col gap-2">
        <p id="api-key-masked" class="text-xs font-mono text-gray-400 truncate"></p>
        <p id="api-key-storage-note" class="text-xs text-gray-600"></p>
        <button id="api-key-clear-btn"
          class="px-3 py-1.5 rounded-lg bg-[#1a1a1a] border border-[#252525] hover:bg-[#222] text-xs text-gray-400 font-medium transition-colors">
          Clear Key
        </button>
      </div>
    </div>

    <div class="flex-1"></div>

    <!-- Exit -->
    <div>
      <button id="exit-btn"
        class="w-full px-3 py-2 rounded-lg bg-[#111] border border-[#1e1e1e] hover:border-[#2a2a2a] text-gray-600 hover:text-gray-400 text-sm font-medium transition-colors">
        Exit App
      </button>
    </div>

  </div>
</aside>
