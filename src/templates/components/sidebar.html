<aside id="sidebar"
  class="flex flex-col w-64 min-w-0 bg-gray-900 border-r border-gray-800 transition-all duration-200 relative shrink-0">

  <!-- Collapse toggle -->
  <button id="sidebar-toggle"
    class="absolute -right-3 top-5 z-10 w-6 h-6 flex items-center justify-center rounded-full bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs transition-colors">
    ‹
  </button>

  <div id="sidebar-content" class="flex flex-col flex-1 p-4 overflow-y-auto gap-6 min-w-0">

    <!-- Logo / title -->
    <div class="sidebar-label">
      <h1 class="text-lg font-bold text-white truncate">Punto Medio</h1>
    </div>

    <!-- Active Role -->
    <div class="sidebar-label">
      <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">Active Role</p>
      <p id="sidebar-role-name" class="text-sm font-medium text-gray-200 truncate">—</p>
      <a href="/" id="change-role-btn"
        class="mt-2 inline-block text-xs text-blue-400 hover:text-blue-300 transition-colors">
        Change Role
      </a>
    </div>

    <!-- GFCA API Key -->
    <div class="sidebar-label">
      <p class="text-xs text-gray-500 uppercase tracking-wider mb-2">GFCA API Key</p>

      <!-- No key set: input form -->
      <div id="api-key-form" class="flex flex-col gap-2">
        <input id="api-key-input" type="password" placeholder="Enter API key…"
          class="w-full bg-gray-800 border border-gray-600 rounded px-2 py-1.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500" />
        <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer select-none">
          <input id="api-key-remember" type="checkbox" class="accent-blue-500" />
          Remember this key
        </label>
        <button id="api-key-save-btn"
          class="px-3 py-1.5 rounded bg-blue-600 hover:bg-blue-500 text-xs text-white font-medium transition-colors">
          Save
        </button>
      </div>

      <!-- Key set: masked display -->
      <div id="api-key-display" class="hidden flex flex-col gap-2">
        <p id="api-key-masked" class="text-xs font-mono text-gray-300 truncate"></p>
        <p id="api-key-storage-note" class="text-xs text-gray-500"></p>
        <button id="api-key-clear-btn"
          class="px-3 py-1.5 rounded bg-gray-700 hover:bg-gray-600 text-xs text-gray-200 font-medium transition-colors">
          Clear Key
        </button>
      </div>
    </div>

    <div class="flex-1"></div>

    <!-- Exit -->
    <div>
      <button id="exit-btn"
        class="w-full px-3 py-2 rounded-lg bg-red-800/60 hover:bg-red-700/80 text-red-200 text-sm font-medium transition-colors">
        Exit App
      </button>
    </div>

  </div>
</aside>
