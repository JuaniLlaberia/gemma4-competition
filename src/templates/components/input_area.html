<div id="input-area" class="w-full max-w-3xl mx-auto px-4 pb-5 pt-2">

  <!-- RAG file chips -->
  <div id="rag-chips" class="flex flex-wrap gap-2 mb-2 empty:hidden"></div>

  <!-- Main input box -->
  <div class="bg-[#141414] rounded-2xl border border-[#1e1e1e]">

    <!-- Text mode -->
    <div id="text-mode" class="px-4 pt-4 pb-1">
      <textarea id="text-input" rows="3" maxlength="10000"
        placeholder="Paste or type an article to fact-check…"
        class="w-full bg-transparent text-white placeholder-gray-600 text-sm leading-relaxed focus:outline-none resize-none"></textarea>
    </div>

    <!-- Image mode (hidden by default) -->
    <div id="image-mode" class="hidden px-4 pt-4 pb-1">
      <div id="image-dropzone"
        class="border-2 border-dashed border-[#2a2a2a] rounded-xl p-8 flex flex-col items-center justify-center gap-2 cursor-pointer hover:border-[#3a3a3a] transition-colors">
        <svg class="w-8 h-8 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <p class="text-sm text-gray-500">Drop an image here or <span class="text-gray-300">browse</span></p>
        <p class="text-xs text-gray-700">JPG, PNG, WebP — single file</p>
        <input id="image-file-input" type="file" accept=".jpg,.jpeg,.png,.webp" class="hidden" />
      </div>
      <!-- Image preview: full-width with blue filename bar (hidden until image selected) -->
      <div id="image-preview-container" class="hidden rounded-xl overflow-hidden border border-[#2a2a2a] mb-2">
        <img id="image-preview" alt="Selected image" class="w-full max-h-44 object-cover block" />
        <div class="flex items-center gap-2 bg-[#0d1f36] px-3 py-2 border-t border-blue-900/40">
          <svg class="w-3.5 h-3.5 text-blue-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <p id="image-filename" class="text-xs text-blue-300 font-medium truncate flex-1"></p>
          <button id="remove-image-btn"
            class="text-blue-400/60 hover:text-white transition-colors cursor-pointer text-xs ml-1">✕</button>
        </div>
      </div>
    </div>

    <!-- Toolbar row -->
    <div class="flex items-center gap-1 px-3 py-2.5">

      <!-- Image toggle -->
      <button id="image-toggle-btn" title="Toggle image input"
        class="p-2 rounded-lg text-gray-600 hover:text-gray-300 hover:bg-[#1e1e1e] active:scale-95 transition-all cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </button>

      <!-- RAG attach -->
      <button id="rag-attach-btn" title="Attach context documents"
        class="p-2 rounded-lg text-gray-600 hover:text-gray-300 hover:bg-[#1e1e1e] active:scale-95 transition-all cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
        </svg>
      </button>
      <input id="rag-file-input" type="file" accept=".pdf,.txt,.docx,.md" multiple class="hidden" />

      <!-- API Key -->
      <button id="api-key-btn" title="Configure API key"
        class="p-2 rounded-lg text-gray-600 hover:text-gray-300 hover:bg-[#1e1e1e] active:scale-95 transition-all cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </button>

      <!-- Role -->
      <button id="role-btn" title="Configure role"
        class="flex items-center gap-1.5 px-2 py-1.5 rounded-lg text-gray-600 hover:text-gray-300 hover:bg-[#1e1e1e] active:scale-95 transition-all cursor-pointer">
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        <span id="role-name-display" class="hidden text-xs max-w-[80px] truncate"></span>
      </button>

      <span id="char-counter" class="text-xs text-gray-700 ml-1">0 / 10,000</span>

      <div class="flex-1"></div>

      <!-- Send button -->
      <button id="send-btn" disabled
        class="w-8 h-8 flex items-center justify-center rounded-xl bg-white text-black disabled:opacity-25 disabled:cursor-not-allowed hover:bg-gray-100 active:scale-95 transition-all cursor-pointer">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>

      <!-- Stop button (hidden by default) — always remains clickable -->
      <button id="stop-btn"
        class="hidden w-8 h-8 flex items-center justify-center rounded-xl bg-[#1e1e1e] border border-[#2a2a2a] text-gray-400 hover:text-white hover:bg-[#252525] active:scale-95 transition-all cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24">
          <rect x="6" y="6" width="12" height="12" rx="1"/>
        </svg>
      </button>

      <!-- Reset button (hidden by default; shown when analysis is done) -->
      <button id="reset-btn" title="Start new analysis"
        class="hidden w-8 h-8 flex items-center justify-center rounded-xl bg-white text-black hover:bg-gray-100 active:scale-95 transition-all cursor-pointer">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
      </button>

    </div>
  </div>
</div>
