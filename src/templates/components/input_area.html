<div id="input-area" class="border-t border-gray-800 bg-gray-900 px-6 py-4">

  <!-- Text mode -->
  <div id="text-mode" class="mb-3">
    <textarea id="text-input" rows="4" maxlength="10000"
      placeholder="Paste or type an article or piece of text to fact-check…"
      class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
    <div class="flex justify-end mt-1">
      <span id="char-counter" class="text-xs text-gray-500">0 / 10,000</span>
    </div>
  </div>

  <!-- Image mode (hidden by default) -->
  <div id="image-mode" class="hidden mb-3">
    <div id="image-dropzone"
      class="border-2 border-dashed border-gray-600 rounded-lg p-8 flex flex-col items-center justify-center gap-2 cursor-pointer hover:border-blue-500 transition-colors">
      <svg class="w-8 h-8 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <p class="text-sm text-gray-400">Drop an image here or <span class="text-blue-400">browse</span></p>
      <p class="text-xs text-gray-500">JPG, PNG, WebP — single file</p>
      <input id="image-file-input" type="file" accept=".jpg,.jpeg,.png,.webp" class="hidden" />
    </div>
    <!-- Image preview -->
    <div id="image-preview-container" class="hidden mt-3 flex items-center gap-3">
      <img id="image-preview" alt="Selected image" class="h-16 w-16 object-cover rounded" />
      <div class="flex-1 min-w-0">
        <p id="image-filename" class="text-sm text-gray-300 truncate"></p>
      </div>
      <button id="remove-image-btn"
        class="text-xs text-red-400 hover:text-red-300 transition-colors">Remove</button>
    </div>
  </div>

  <!-- RAG file chips -->
  <div id="rag-chips" class="flex flex-wrap gap-2 mb-3 empty:hidden"></div>

  <!-- Toolbar -->
  <div class="flex items-center gap-3">

    <!-- Image toggle -->
    <button id="image-toggle-btn" title="Toggle image input"
      class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    </button>

    <!-- RAG attach -->
    <button id="rag-attach-btn" title="Attach files for context"
      class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13" />
      </svg>
    </button>
    <input id="rag-file-input" type="file" accept=".pdf,.txt,.docx,.md" multiple class="hidden" />

    <div class="flex-1"></div>

    <!-- Send button -->
    <button id="send-btn" disabled
      class="px-5 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm font-medium transition-colors">
      Send
    </button>

    <!-- Stop button (hidden by default) -->
    <button id="stop-btn"
      class="hidden px-5 py-2 rounded-lg bg-red-700 hover:bg-red-600 text-white text-sm font-medium transition-colors">
      ■ Stop
    </button>

  </div>
</div>
